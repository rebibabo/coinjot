name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web (www/)
        run: node build-www.js

      - name: Add Android platform
        run: npx cap add android

      - name: Lock portrait orientation
        run: sed -i '/android:name=".MainActivity"/a\            android:screenOrientation="portrait"' android/app/src/main/AndroidManifest.xml

      - name: Generate app icon & splash
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          mkdir -p assets
          rsvg-convert resources/icon.svg   -w 1024 -h 1024 -o assets/logo.png
          rsvg-convert resources/splash.svg -w 2732 -h 2732 -o assets/splash.png
          npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Use fixed debug keystore (一致签名，便于覆盖更新)
        run: mkdir -p ~/.android && cp debug.keystore ~/.android/debug.keystore

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk coinjot.apk

      - name: Publish to Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 记账 coinjot · latest
          body: "最新构建的安卓安装包，下载 coinjot.apk 直接安装。"
          files: coinjot.apk
