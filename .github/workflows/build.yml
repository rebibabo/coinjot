name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# 同一时间只跑一个构建，避免多个 [release] 并发操作同一个 Gitee release 互相删附件
concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    # 只有两种情况才打包发布：提交信息带 [release]，或在 Actions 页手动 Run workflow。
    # 普通推送不构建，避免每次提交都覆盖 APK。
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]') }}
    runs-on: ubuntu-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ---- 依赖缓存：命中则省掉 npm 下载 + Gradle 发行版/依赖下载 ----
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Build web (www/)
        run: node build-www.js

      - name: Add Android platform
        run: npx cap add android

      - name: Lock portrait orientation
        run: sed -i '/android:name=".MainActivity"/a\            android:screenOrientation="portrait"' android/app/src/main/AndroidManifest.xml

      - name: Add install-packages permission (应用内更新唤起安装器)
        run: sed -i 's#<application#<uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>\n    <application#' android/app/src/main/AndroidManifest.xml

      - name: Generate app icon & splash
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          mkdir -p assets
          # 自适应图标分层：背景铺满 + 前景透明缩进安全区，避免启动器遮罩露出边框
          rsvg-convert resources/icon-background.svg -w 1024 -h 1024 -o assets/icon-background.png
          rsvg-convert resources/icon-foreground.svg -w 1024 -h 1024 -o assets/icon-foreground.png
          rsvg-convert resources/icon-only.svg       -w 1024 -h 1024 -o assets/icon-only.png
          rsvg-convert resources/splash.svg          -w 2732 -h 2732 -o assets/splash.png
          npx @capacitor/assets generate --android

      - name: Generate adaptive launcher icons (deterministic, 覆盖图标避免黑边)
        run: |
          sudo apt-get install -y librsvg2-bin
          RES=android/app/src/main/res
          # 自适应图标画布 108dp / legacy 图标 48dp，各密度像素：
          declare -A ADP=( [mdpi]=108 [hdpi]=162 [xhdpi]=216 [xxhdpi]=324 [xxxhdpi]=432 )
          declare -A LEG=( [mdpi]=48  [hdpi]=72  [xhdpi]=96  [xxhdpi]=144 [xxxhdpi]=192 )
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            dir=$RES/mipmap-$d; mkdir -p "$dir"
            rsvg-convert resources/icon-background.svg -w ${ADP[$d]} -h ${ADP[$d]} -o "$dir/ic_launcher_background.png"
            rsvg-convert resources/icon-foreground.svg -w ${ADP[$d]} -h ${ADP[$d]} -o "$dir/ic_launcher_foreground.png"
            rsvg-convert resources/icon-only.svg       -w ${LEG[$d]} -h ${LEG[$d]} -o "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done
          mkdir -p "$RES/mipmap-anydpi-v26"
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"
          echo "---- generated mipmaps ----"; ls -R "$RES" | grep -A6 "mipmap-xxhdpi:"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Use fixed debug keystore (显式签名配置，签名跨构建一致)
        run: |
          cp debug.keystore android/app/debug.keystore
          cat > android/app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
          }
          EOF
          echo 'apply from: "signing.gradle"' >> android/app/build.gradle
          echo "---- signing.gradle ----"; cat android/app/signing.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk coinjot.apk

      - name: Publish to Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 记账 coinjot · latest
          body: "最新构建的安卓安装包，下载 coinjot.apk 直接安装。"
          files: coinjot.apk

      # 同步 APK 到 Gitee 的 latest Release（国内下载/应用内更新用）；未配 GITEE_TOKEN 则跳过
      - name: Publish APK to Gitee Release
        if: ${{ env.GITEE_TOKEN != '' }}
        env:
          OWNER: yuan-zhongsheng
          REPO: coinjot
          TAG: latest
        run: |
          api="https://gitee.com/api/v5/repos/$OWNER/$REPO"
          rel=$(curl -s "$api/releases/tags/$TAG?access_token=$GITEE_TOKEN")
          id=$(printf '%s' "$rel" | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get("id","") if isinstance(d,dict) else "")' 2>/dev/null)
          if [ -z "$id" ]; then
            rel=$(curl -s -X POST "$api/releases" -d "access_token=$GITEE_TOKEN" -d "tag_name=$TAG" -d "name=coinjot $TAG" -d "body=最新构建，下载 coinjot.apk 直接安装。" -d "target_commitish=main")
            id=$(printf '%s' "$rel" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("id",""))' 2>/dev/null)
          fi
          echo "gitee release id=$id"
          [ -z "$id" ] && { echo "无法获取/创建 Gitee release：$rel"; exit 1; }
          atts=$(curl -s "$api/releases/$id/attach_files?access_token=$GITEE_TOKEN")
          printf '%s' "$atts" | python3 -c 'import sys,json;d=json.load(sys.stdin);[print(a["id"]) for a in (d if isinstance(d,list) else []) if a.get("name")=="coinjot.apk"]' | while read aid; do
            [ -n "$aid" ] && curl -s -X DELETE "$api/releases/$id/attach_files/$aid?access_token=$GITEE_TOKEN" >/dev/null && echo "删除旧附件 $aid"
          done
          echo "上传 coinjot.apk 到 Gitee（$(du -h coinjot.apk | cut -f1)）..."
          ok=0
          for try in 1 2 3; do
            echo "第 $try 次上传..."
            code=$(curl -sS --connect-timeout 30 --max-time 240 -o gitee_resp.json -w '%{http_code}' \
              -X POST "$api/releases/$id/attach_files?access_token=$GITEE_TOKEN" \
              -F "file=@coinjot.apk;type=application/vnd.android.package-archive") && \
            echo "HTTP $code" && cat gitee_resp.json && echo
            if [ "$code" = "201" ] || [ "$code" = "200" ]; then ok=1; break; fi
            echo "上传未成功(HTTP $code)，10s 后重试..."; sleep 10
          done
          [ "$ok" = "1" ] || { echo "Gitee 上传多次失败"; exit 1; }
          python3 -c 'import json;d=json.load(open("gitee_resp.json"));print("已上传:", d.get("name"), "->", d.get("download_url") or d.get("browser_download_url") or d)' 2>/dev/null || true
          echo "== 校验附件已挂到 release =="
          curl -s "$api/releases/$id/attach_files?access_token=$GITEE_TOKEN" | python3 -c 'import sys,json;print("当前附件:", [a.get("name") for a in json.load(sys.stdin)])'
          echo "== 校验公开下载地址 =="
          curl -sIL "https://gitee.com/$OWNER/$REPO/releases/download/$TAG/coinjot.apk" | grep -iE "HTTP/|content-disposition" | head
