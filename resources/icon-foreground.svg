<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 透明底；内容整体缩到中心安全区（围绕 512,512 缩放 0.66），任何遮罩形状都不会裁到 -->
  <g transform="translate(512,512) scale(0.66) translate(-512,-512)">
    <!-- 柔光圆盘 -->
    <circle cx="512" cy="500" r="300" fill="#ffffff" opacity="0.14"/>
    <!-- 人民币符号 -->
    <text x="512" y="512" font-family="-apple-system,'PingFang SC',Helvetica,Arial,sans-serif"
          font-size="600" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="central">¥</text>
    <!-- 右上小上扬箭头 -->
    <path d="M735 372 l60 -60 m0 0 h-46 m46 0 v46" fill="none" stroke="#11e0a0"
          stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
